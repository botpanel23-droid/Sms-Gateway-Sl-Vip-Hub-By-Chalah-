<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Gateway Test Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background: #00C851;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .response.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .response.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .response.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 WhatsApp Gateway</h1>
        <p class="subtitle">Message යවන්න පහසුවෙන්</p>
        
        <div class="status">
            <div class="status-indicator" id="statusIndicator"></div>
            <div>
                <strong>Status:</strong> <span id="statusText">Checking...</span>
            </div>
        </div>
        
        <form id="messageForm">
            <div class="form-group">
                <label for="number">📞 Phone Number (Country Code එක සමඟ)</label>
                <input 
                    type="text" 
                    id="number" 
                    placeholder="94771234567" 
                    required
                    pattern="[0-9+\-\s]+"
                >
                <small style="color: #666; font-size: 12px;">උදා: 94771234567</small>
            </div>
            
            <div class="form-group">
                <label for="message">💬 Message</label>
                <textarea 
                    id="message" 
                    placeholder="ඔබේ message එක මෙහි ලියන්න..."
                    required
                ></textarea>
            </div>
            
            <button type="submit" class="btn" id="sendBtn">
                📤 Message එක යවන්න
            </button>
        </form>
        
        <div class="response" id="response"></div>
        
        <div class="footer">
            Made with ❤️ using Baileys
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        
        // Check status on load
        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/status`);
                const data = await response.json();
                
                const indicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                
                if (data.connected) {
                    indicator.classList.add('connected');
                    statusText.textContent = 'Connected ✅';
                } else {
                    indicator.classList.remove('connected');
                    statusText.textContent = 'Not Connected ❌ (QR Code scan කරන්න)';
                }
            } catch (error) {
                document.getElementById('statusText').textContent = 'Server එක run වෙන්නේ නැහැ ⚠️';
            }
        }
        
        // Send message
        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const number = document.getElementById('number').value;
            const message = document.getElementById('message').value;
            const sendBtn = document.getElementById('sendBtn');
            const responseDiv = document.getElementById('response');
            
            // Disable button
            sendBtn.disabled = true;
            sendBtn.textContent = '📤 යවමින් පවතී...';
            
            try {
                const response = await fetch(`${API_URL}/send-message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ number, message })
                });
                
                const data = await response.json();
                
                responseDiv.className = 'response show ' + (response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    responseDiv.innerHTML = `
                        <strong>✅ සාර්ථකයි!</strong><br>
                        Message එක ${number} වෙත යවන ලදී.
                    `;
                    document.getElementById('message').value = '';
                } else {
                    responseDiv.innerHTML = `
                        <strong>❌ Error!</strong><br>
                        ${data.error || 'Message එක යවන්න බැරි වුණා'}
                    `;
                }
            } catch (error) {
                responseDiv.className = 'response show error';
                responseDiv.innerHTML = `
                    <strong>❌ Connection Error!</strong><br>
                    Server එක run වෙන්නේ නැහැ වගේ. <code>npm start</code> කරලා ඇද්ද?
                `;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '📤 Message එක යවන්න';
            }
        });
        
        // Check status every 5 seconds
        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
